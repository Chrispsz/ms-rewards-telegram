name: Microsoft Rewards Daily Run

on:
    schedule:
        - cron: '0 10 * * *'
    workflow_dispatch:

env:
    NODE_VERSION: '24'

jobs:
    run-rewards:
        runs-on: ubuntu-latest
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'
            - run: npm ci
            - run: npm run build
            - run: npx patchright install chromium
            - run: |
                  cat > dist/accounts.json << 'ACCT'
                  [{"email":"${{ secrets.ACCOUNT_EMAIL }}","password":"${{ secrets.ACCOUNT_PASSWORD }}","totpSecret":"${{ secrets.ACCOUNT_TOTP }}","recoveryEmail":"${{ secrets.ACCOUNT_RECOVERY }}","geoLocale":"auto","langCode":"pt","proxy":{"proxyAxios":false,"url":"","port":0,"username":"","password":""},"saveFingerprint":{"mobile":false,"desktop":false}}]
                  ACCT
            - run: |
                  cat > dist/config.json << 'CFG'
                  {"baseURL":"https://rewards.bing.com","sessionPath":"sessions","headless":true,"clusters":1,"errorDiagnostics":false,"workers":{"doDailySet":true,"doSpecialPromotions":true,"doMorePromotions":true,"doPunchCards":true,"doAppPromotions":true,"doDesktopSearch":true,"doMobileSearch":true,"doDailyCheckIn":true,"doReadToEarn":true},"searchOnBingLocalQueries":false,"globalTimeout":"30sec","searchSettings":{"scrollRandomResults":false,"clickRandomResults":false,"parallelSearching":true,"queryEngines":["google","wikipedia","reddit","local"],"searchResultVisitTime":"10sec","searchDelay":{"min":"30sec","max":"1min"},"readDelay":{"min":"30sec","max":"1min"}},"debugLogs":false,"consoleLogFilter":{"enabled":false,"mode":"whitelist","levels":["error","warn"],"keywords":["starting account"],"regexPatterns":[]},"proxy":{"queryEngine":true},"webhook":{"telegram":{"enabled":true,"botToken":"${{ secrets.TELEGRAM_BOT_TOKEN }}","chatId":"${{ secrets.TELEGRAM_CHAT_ID }}","parseMode":"HTML","silent":false},"ntfy":{"enabled":false,"url":"","topic":"","token":"","title":"","tags":[],"priority":3},"webhookLogFilter":{"enabled":true,"mode":"whitelist","levels":["error"],"keywords":["ACCOUNT-END","RUN-END","ACCOUNT-ERROR"],"regexPatterns":[]}}}
                  CFG
            - uses: actions/cache@v4
              with:
                  path: dist/browser/sessions
                  key: rewards-sessions-${{ github.run_id }}
                  restore-keys: rewards-sessions-
            - run: npm start
            - uses: actions/cache/save@v4
              with:
                  path: dist/browser/sessions
                  key: rewards-sessions-${{ github.run_id }}
            - uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: rewards-logs-${{ github.run_id }}
                  path: logs/,diagnostics/
                  retention-days: 7
